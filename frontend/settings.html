<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings – EduMind AI</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="logo">⚡ EduMind</div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html">🏠 Home</a></li>
      <li><a href="chat.html">💬 AI Chat</a></li>
      <li><a href="billing.html">💳 Billing</a></li>
      <li><a href="settings.html" class="active">⚙️ Settings</a></li>
      <li><a href="#" onclick="logout()">🚪 Logout</a></li>
    </ul>
  </aside>
  <main class="main-content">
    <h1 class="page-title">Settings</h1>
    <p class="page-subtitle">Manage your account preferences.</p>

    <div class="glass" style="padding:32px;margin-bottom:24px;">
      <h3 style="margin-bottom:20px;">Account Information</h3>
      <div class="input-group"><label>Full Name</label><input type="text" id="profileName" disabled></div>
      <div class="input-group"><label>Email Address</label><input type="email" id="profileEmail" disabled></div>
    </div>

    <div class="glass" style="padding:32px;margin-bottom:24px;">
      <h3 style="margin-bottom:20px;">Change Password</h3>
      <div id="pwdAlert"></div>
      <form id="passwordForm">
        <div class="input-group"><label>Current Password</label><input type="password" id="oldPassword" required></div>
        <div class="input-group"><label>New Password</label><input type="password" id="newPassword" minlength="6" required></div>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>
    </div>

    <div class="glass" style="padding:32px;">
      <h3 style="margin-bottom:20px;">Session</h3>
      <button class="btn btn-danger" onclick="logout()">Log Out of Account</button>
    </div>
  </main>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) location.href = 'login.html';

async function loadProfile() {
  const res = await fetch('https://edumind-n990.onrender.com/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
  const user = await res.json();
  document.getElementById('profileName').value = user.name;
  document.getElementById('profileEmail').value = user.email;
}

document.getElementById('passwordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const res = await fetch('https://edumind-n990.onrender.com/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({
        oldPassword: document.getElementById('oldPassword').value,
        newPassword: document.getElementById('newPassword').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('pwdAlert').innerHTML = `<div class="alert success">${data.message}</div>`;
    document.getElementById('passwordForm').reset();
  } catch (err) {
    document.getElementById('pwdAlert').innerHTML = `<div class="alert error">${err.message}</div>`;
  }
});

function logout() { localStorage.clear(); location.href = 'login.html'; }
loadProfile();
</script>
</body>
</html>
